<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Internet Programming Movie Site</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>

    <h1 class="site-title">Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>

    <div class="nav-links">
        <a href="index.html">메인페이지</a> | <a href="login.html">로그인</a> | 회원가입
    </div>

    <div class="form-container">
        <form action="#" method="post">

            <div class="form-row">
                <label class="form-label" for="name">이름 :</label>
                <input class="form-input" type="text" id="name" name="name"
                       autofocus required placeholder="이름 입력">
            </div>

            <div class="form-row">
                <label class="form-label" for="birthday">생일 :</label>
                <input class="form-input" type="date" id="birthday" name="birthday"
                       required autocomplete="bday">
            </div>

            <div class="form-row">
                <span class="form-label">성별 :</span>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="male" required> 남성</label>
                    <label><input type="radio" name="gender" value="female"> 여성</label>
                </div>
            </div>

            <div class="form-row">
                <label class="form-label" for="grade">학년 :</label>
                <input class="form-input-number" type="number" id="grade" name="grade"
                       min="1" max="6" step="1" placeholder="학년 입력" required>
            </div>

            <div class="form-row">
                <label class="form-label" for="userid">아이디 :</label>
                <input class="form-input" type="text" id="userid" name="userid"
                       placeholder="아이디 입력" required autocomplete="username">
            </div>

            <div class="form-row">
                <label class="form-label" for="password">비밀번호 :</label>
                <input class="form-input" type="password" id="password" name="password"
                       placeholder="비밀번호 입력" required autocomplete="new-password">
            </div>

            <div class="form-row">
                <label class="form-label" for="email">이메일 :</label>
                <input class="form-input" type="email" id="email" name="email"
                       placeholder="이메일 입력" required autocomplete="email">
            </div>

            <div class="form-row">
                <label class="form-label" for="security-question">보안 질문 :</label>
                <select class="form-select" id="security-question" name="security-question" required>
                    <option value="">질문을 선택하세요</option>
                    <option value="pet">내가 처음 키운 반려동물의 이름은?</option>
                    <option value="school">내가 다닌 초등학교 이름은?</option>
                    <option value="city">내가 태어난 도시는?</option>
                    <option value="movie">내가 가장 좋아하는 영화는?</option>
                </select>
            </div>

            <div class="form-row">
                <label class="form-label" for="answer">답변 :</label>
                <input class="form-input" type="text" id="answer" name="answer"
                       placeholder="답변 입력" required>
            </div>

            <div class="button-row">
                <button class="btn-submit" type="submit">Signup</button>
                <button class="btn-cancel" type="reset">Cancel</button>
            </div>

        </form>
    </div>

</body>
</html>
